<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso privado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-start: #12203d;
      --bg-end: #496ebb;
      --card-bg: rgba(247, 250, 255, 0.16);
      --card-line: rgba(255, 255, 255, 0.22);
      --text: #f7fbff;
      --muted: rgba(247, 251, 255, 0.82);
      --button-start: #6f90d6;
      --button-end: #4a72bf;
      --error-bg: rgba(147, 22, 31, 0.24);
      --error-line: rgba(255, 220, 220, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(174, 191, 231, 0.3), transparent 26%),
        radial-gradient(circle at bottom right, rgba(255, 214, 182, 0.18), transparent 22%),
        linear-gradient(135deg, var(--bg-start), var(--bg-end));
    }

    .login-card {
      width: min(92vw, 480px);
      padding: 34px;
      border-radius: 34px;
      border: 1px solid var(--card-line);
      background: var(--card-bg);
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 80px rgba(15, 27, 54, 0.3);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 16px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e2ecff;
      box-shadow: 0 0 14px rgba(226, 236, 255, 0.9);
    }

    h1 {
      margin: 0 0 12px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.6rem, 5vw, 3.8rem);
      line-height: 0.95;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      line-height: 1.8;
      color: var(--muted);
    }

    form {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    label {
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(111, 144, 214, 0.2);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      color: #1f2a42;
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 14px 18px;
      background: linear-gradient(135deg, var(--button-start), var(--button-end));
      color: var(--text);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 18px 28px rgba(74, 114, 191, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .error {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--error-line);
      background: var(--error-bg);
      color: #ffe7e9;
      line-height: 1.6;
    }

    .error.is-visible {
      display: block;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <p class="eyebrow">Acceso privado</p>
    <h1>Necesitas contraseña para entrar</h1>
    <p>
      Toda la web queda protegida por el Worker. Cuando la contraseña sea correcta, se creará
      una cookie de sesión y podrás navegar por el sitio y ver las imágenes privadas.
    </p>

    <p class="error" id="login-error" role="alert">
      La contraseña no es correcta. Inténtalo otra vez.
    </p>

    <form method="post" action="/login">
      <input type="hidden" name="next" id="next" value="/" />

      <label for="password">Contraseña</label>
      <input
        id="password"
        name="password"
        type="password"
        autocomplete="current-password"
        placeholder="Escribe la contraseña"
        required
      />

      <button type="submit">Entrar</button>
    </form>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const nextInput = document.getElementById("next");
    const error = document.getElementById("login-error");

    if (nextInput) {
      const next = params.get("next");
      if (next && next.startsWith("/") && !next.startsWith("//")) {
        nextInput.value = next;
      }
    }

    if (params.get("error") === "1" && error) {
      error.classList.add("is-visible");
    }
  </script>
</body>
</html>
